name: Generate Stats Cards

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: output
          fetch-depth: 0

      - uses: vn7n24fzkq/github-profile-summary-cards@release
        with:
          USERNAME: ${{ github.repository_owner }}
          BRANCH_NAME: output
          UTC_OFFSET: 1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
